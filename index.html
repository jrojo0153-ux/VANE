<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Vane: The Movie 🎬</title>
    <link href="https://fonts.googleapis.com/css2?family=Anton&family=Special+Elite&display=swap" rel="stylesheet">
    <style>
        :root {
            --vane-red: #ff0000;
            --vane-pink: #ff69b4;
            --bg-dark: #000;
        }

        body, html {
            margin: 0; padding: 0; width: 100%; height: 100%;
            background-color: var(--bg-dark);
            color: white; font-family: 'Anton', sans-serif;
            overflow: hidden; display: flex; flex-direction: column;
            justify-content: center; align-items: center; text-align: center;
        }

        .cliche-btn {
            padding: 15px 30px; font-size: 1.2rem; background: var(--vane-red);
            border: 2px solid white; color: white; border-radius: 50px;
            cursor: pointer; position: absolute; display: none; z-index: 1000;
            box-shadow: 0 0 20px var(--vane-red); transition: 0.2s;
        }

        #instructions { font-family: 'Special Elite', cursive; font-size: 1.8rem; color: var(--vane-pink); z-index: 400; padding: 20px; }

        #camera-viewport { display: none; width: 100%; height: 100%; flex-direction: column; justify-content: center; align-items: center; position: relative; }

        .vane-hero {
            font-size: 7rem;
            background: linear-gradient(to right, var(--vane-red), var(--vane-pink));
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
            margin: 0; padding: 0;
            filter: drop-shadow(0 0 20px var(--vane-red));
        }

        .cats-below { font-size: 110px; margin-top: -10px; }

        .dynamic-phrase {
            position: absolute; padding: 15px; font-size: 1.4rem;
            background: rgba(255,0,0,0.3); border-radius: 10px;
            opacity: 0; transition: 1s; z-index: 50; border: 1px solid var(--vane-pink);
        }

        #emoji-reveal { font-size: 130px; display: none; flex-direction: column; align-items: center; z-index: 1001; }
        #emoji-subtext { font-size: 1.8rem; color: #ffd700; margin-top: 15px; font-style: italic; }

        /* GATO REBOTÍN FINAL */
        #bouncing-cat {
            position: absolute; font-size: 100px; display: none; z-index: 2000;
            filter: drop-shadow(0 0 15px white);
        }
        
        #y-volo-text {
            position: absolute; font-size: 4rem; color: var(--vane-pink);
            display: none; z-index: 2001; text-transform: uppercase;
            filter: drop-shadow(0 0 10px var(--vane-pink));
        }

        .particle { position: absolute; top: -50px; pointer-events: none; animation: fall linear forwards; }
        @keyframes fall { to { transform: translateY(110vh) rotate(720deg); } }
    </style>
</head>
<body>

    <div id="intro-buttons">
        <button class="cliche-btn" id="start-btn" style="display:block; position:relative;" onclick="nextStep(1)">HOLA VANE, DA CLICK AQUÍ 🎬</button>
        <button class="cliche-btn" id="btn-step-2" onclick="nextStep(2)">¡NO! MEJOR AQUÍ 👇</button>
        <button class="cliche-btn" id="btn-step-3" onclick="nextStep(3)">ESTE ES EL BUENO, AQUÍ 💎</button>
    </div>

    <div id="instructions"></div>

    <div id="camera-viewport">
        <div id="pixar-intro" style="font-size: 6rem; display: flex; gap: 15px;">
            <div id="pixar-cat" style="position:absolute; display:none;">🐱</div>
            <span class="letter" style="opacity:0;">V</span>
            <span class="letter" style="opacity:0;">A</span>
            <span class="letter" style="opacity:0;">N</span>
            <span class="letter" style="opacity:0;">E</span>
        </div>

        <div id="main-show" style="display:none; flex-direction: column; align-items: center;">
            <h1 class="vane-hero">VANE</h1>
            <div class="cats-below">🫂🐱</div>
        </div>

        <div class="dynamic-phrase" style="top: 10%; right: 5%;" id="f1">Admiro tu disciplina 💪</div>
        <div class="dynamic-phrase" style="bottom: 15%; left: 5%;" id="f2">Nadie chambea como tú 🔥</div>
        <div class="dynamic-phrase" style="top: 25%; left: 5%;" id="f3">Reina de los Tattoos 💉</div>
        <div class="dynamic-phrase" style="bottom: 10%; right: 5%;" id="f4">Uñas de Impacto 💅✨</div>
    </div>

    <button class="cliche-btn" id="cliche-1" style="top:50%; left:50%; transform:translate(-50%, -50%);" onclick="clicheChase(2)">¿Quieres saber quién soy? (Cliché) AQUÍ</button>
    <button class="cliche-btn" id="cliche-2" style="top:25%; left:15%;" onclick="clicheChase(3)">¡NO! MEJOR AQUÍ</button>
    <button class="cliche-btn" id="cliche-3" style="top:75%; right:20%;" onclick="finalReveal()">¡AQUÍ POR FIN!</button>

    <div id="emoji-reveal">
        <div id="big-emoji"></div>
        <div id="emoji-subtext"></div>
    </div>
    
    <div id="bouncing-cat">🐈</div>
    <div id="y-volo-text">¡Y VOLÓ! 🚀</div>

    <script>
        function nextStep(s) {
            if(s==1) { document.getElementById('start-btn').style.display='none'; document.getElementById('btn-step-2').style.display='block'; }
            if(s==2) { document.getElementById('btn-step-2').style.display='none'; document.getElementById('btn-step-3').style.display='block'; }
            if(s==3) { document.getElementById('btn-step-3').style.display='none'; runInstructions(); }
        }

        function runInstructions() {
            const inst = [
                "¡SILENCIO EN LA SALA!", 
                "CIERRA TUS... ABRE TU MENTE...", 
                "¡DISCULPA ASÍ NO ERA JA! 😂", 
                "AHORA SÍ...", 
                "¡QUE COMIENCE LA FUNCIÓN!"
            ];
            const div = document.getElementById('instructions');
            let i = 0;
            const timer = setInterval(() => {
                if(i < inst.length) { div.innerHTML = inst[i]; i++; }
                else { clearInterval(timer); div.style.display='none'; startPixar(); }
            }, 1800);
        }

        function startPixar() {
            document.getElementById('camera-viewport').style.display='flex';
            const letters = document.querySelectorAll('.letter');
            const cat = document.getElementById('pixar-cat');
            cat.style.display='block';
            letters.forEach((l, i) => {
                setTimeout(() => {
                    const rect = l.getBoundingClientRect();
                    cat.style.left = (rect.left - 10) + 'px';
                    cat.style.top = (rect.top - 100) + 'px';
                    setTimeout(() => { l.style.opacity='1'; cat.style.top=(rect.top-50)+'px'; }, 300);
                }, i * 800);
            });
            setTimeout(mainShow, 4000);
        }

        function mainShow() {
            document.getElementById('pixar-intro').style.display='none';
            document.getElementById('main-show').style.display='flex';
            window.chaosRain = setInterval(createParticle, 100);

            [1, 2, 3, 4].forEach(n => {
                setTimeout(() => {
                    const f = document.getElementById('f'+n);
                    f.style.opacity = '1';
                    setTimeout(() => f.style.opacity = '0', 2500);
                }, n * 3000);
            });

            setTimeout(() => {
                document.getElementById('main-show').style.display='none';
                document.getElementById('cliche-1').style.display='block';
            }, 16000);
        }

        function clicheChase(step) {
            document.getElementById('cliche-'+(step-1)).style.display = 'none';
            document.getElementById('cliche-'+step).style.display = 'block';
        }

        function finalReveal() {
            document.getElementById('cliche-3').style.display = 'none';
            const reveal = document.getElementById('emoji-reveal');
            const bigE = document.getElementById('big-emoji');
            const sub = document.getElementById('emoji-subtext');
            reveal.style.display = 'flex';

            const sequence = [
                { e: '🙉', t: '' },
                { e: '🙈', t: '' },
                { e: '🐆', t: 'ESE NO...' },
                { e: '🐈', t: 'ESTE.' },
                { e: '✨', t: '¡QUE TENGAS UN EXCELENTE DÍA! ❤️' }
            ];

            let i = 0;
            const timer = setInterval(() => {
                if(i < sequence.length) {
                    bigE.innerHTML = sequence[i].e;
                    sub.innerHTML = sequence[i].t;
                    i++;
                } else { 
                    clearInterval(timer);
                    // Esperar un poco y activar el gato rebotín
                    setTimeout(activateBouncingCat, 2500);
                }
            }, 2000);
        }

        function createParticle() {
            const p = document.createElement('div');
            p.className = 'particle';
            const items = ['🏋️‍♀️', '💉', '💅', '🔥', '✨', '💖', '🎊', '👟'];
            p.innerHTML = items[Math.floor(Math.random() * items.length)];
            p.style.left = Math.random() * 100 + 'vw';
            p.style.fontSize = (Math.random() * 25 + 15) + 'px';
            p.style.animationDuration = (Math.random() * 3 + 2) + 's';
            document.body.appendChild(p);
            setTimeout(() => p.remove(), 4000);
        }
        
        // LÓGICA DEL GATO REBOTÍN (¡Y VOLÓ!)
        function activateBouncingCat() {
            // Limpiar todo lo anterior
            document.getElementById('emoji-reveal').style.display = 'none';
            document.getElementById('camera-viewport').style.display = 'none';
            clearInterval(window.chaosRain);
            
            const cat = document.getElementById('bouncing-cat');
            const voloText = document.getElementById('y-volo-text');
            cat.style.display = 'block';
            
            // Posición inicial (centro)
            let x = window.innerWidth / 2 - 50;
            let y = window.innerHeight / 2 - 50;
            // Velocidad y dirección (aleatoria pero rápida)
            let xSpeed = (Math.random() > 0.5 ? 1 : -1) * (15 + Math.random() * 10);
            let ySpeed = (Math.random() > 0.5 ? 1 : -1) * (15 + Math.random() * 10);
            
            let bounces = 0;
            const maxBounces = 12; // Cuántas veces rebota antes de "volar"
            
            function animate() {
                x += xSpeed;
                y += ySpeed;
                
                // Rebote en paredes laterales
                if (x + 100 > window.innerWidth || x < 0) {
                    xSpeed = -xSpeed;
                    bounces++;
                    createImpactEffect(x, y);
                }
                // Rebote en techo y suelo
                if (y + 100 > window.innerHeight || y < 0) {
                    ySpeed = -ySpeed;
                    bounces++;
                    createImpactEffect(x, y);
                }
                
                cat.style.left = x + 'px';
                cat.style.top = y + 'px';
                // Efecto de rotación loca
                cat.style.transform = `rotate(${bounces * 90}deg)`;
                
                if (bounces < maxBounces) {
                    requestAnimationFrame(animate);
                } else {
                    // EL ÚLTIMO SALTO (SALIR VOLANDO)
                    ySpeed = -30; // Directo hacia arriba
                    xSpeed = (Math.random() > 0.5 ? 20 : -20); // Y un poco de lado
                    
                    // Mostrar texto "¡Y VOLÓ!" en el último impacto
                    voloText.style.display = 'block';
                    voloText.style.left = (window.innerWidth / 2 - 100) + 'px';
                    voloText.style.top = (window.innerHeight / 2 - 50) + 'px';
                    
                    // Animación final de salida
                    let finalY = y;
                    let finalX = x;
                    const finalTimer = setInterval(() => {
                        finalY += ySpeed;
                        finalX += xSpeed;
                        cat.style.top = finalY + 'px';
                        cat.style.left = finalX + 'px';
                        cat.style.transform = `rotate(${finalY * 2}deg) scale(0.5)`;
                        
                        if (finalY < -150) {
                            clearInterval(finalTimer);
                            cat.style.display = 'none';
                            // Dejar el texto unos segundos y luego fundir a negro final
                            setTimeout(() => {
                                document.body.style.transition = 'background-color 3s';
                                document.body.style.backgroundColor = 'black';
                                voloText.style.transition = 'opacity 2s';
                                voloText.style.opacity = '0';
                            }, 3000);
                        }
                    }, 20);
                }
            }
            
            animate();
        }
        
        // Efecto visual al chocar con la pared
        function createImpactEffect(x, y) {
            const impact = document.createElement('div');
            impact.innerHTML = '💥';
            impact.style.position = 'absolute';
            impact.style.fontSize = '40px';
            impact.style.left = x + 'px';
            impact.style.top = y + 'px';
            impact.style.zIndex = '1999';
            impact.style.transition = 'opacity 0.5s, transform 0.5s';
            document.body.appendChild(impact);
            setTimeout(() => {
                impact.style.opacity = '0';
                impact.style.transform = 'scale(2)';
                setTimeout(() => impact.remove(), 500);
            }, 10);
        }
    </script>
</body>
</html>
