<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Vane: The Movie 🎬</title>
    <link href="https://fonts.googleapis.com/css2?family=Anton&family=Black+Ops+One&display=swap" rel="stylesheet">
    <style>
        :root {
            --vane-red: #ff0000;
            --vane-pink: #ff69b4;
            --bg-dark: #000;
        }

        body, html {
            margin: 0; padding: 0; width: 100%; height: 100%;
            background-color: var(--bg-dark);
            color: white; font-family: 'Anton', sans-serif;
            overflow: hidden; display: flex; justify-content: center; align-items: center;
        }

        /* FONDO DE TEXTOS DINÁMICOS (Reconocimiento) */
        .bg-text-container {
            position: absolute; width: 100%; height: 100%;
            z-index: 1; opacity: 0.15; pointer-events: none;
            overflow: hidden; display: none;
        }
        .scrolling-text {
            position: absolute; font-size: 2rem; white-space: nowrap;
            animation: slideText 15s linear infinite; text-transform: uppercase;
        }
        @keyframes slideText {
            from { transform: translateX(100%); }
            to { transform: translateX(-100%); }
        }

        /* INTRO PIXAR STYLE */
        #pixar-intro {
            display: flex; gap: 10px; font-size: 6rem; z-index: 100;
        }
        .letter { display: inline-block; opacity: 0; transform: translateY(50px); }
        #pixar-cat { 
            position: absolute; font-size: 4rem; 
            display: none; z-index: 101; 
        }

        /* CONTENIDO PRINCIPAL */
        #main-content { display: none; flex-direction: column; align-items: center; z-index: 10; text-align: center; }

        .vane-heavy {
            font-size: 5.5rem; background: linear-gradient(45deg, var(--vane-red), var(--vane-pink));
            -webkit-background-clip: text; -webkit-text-fill-color: transparent;
            letter-spacing: 15px; filter: drop-shadow(0 0 30px rgba(255,0,85,0.8));
            margin-bottom: 20px; animation: glitch 2s infinite;
        }

        /* GATITO ASOMADIZO 👉👈 🥹 */
        .shy-box {
            position: absolute; bottom: -200px; width: 100%;
            transition: bottom 2s cubic-bezier(0.175, 0.885, 0.32, 1.275);
        }
        .shy-box.peek { bottom: 40px; }
        .emoji-shy { font-size: 70px; line-height: 1; }

        /* PARTÍCULAS */
        .particle { position: absolute; top: -50px; z-index: 5; animation: fall linear forwards; }
        @keyframes fall { to { transform: translateY(110vh) rotate(720deg); } }

        /* MENSAJES */
        #final-msg { font-size: 1.8rem; color: #ffd700; max-width: 80%; text-transform: uppercase; margin-top: 20px; }

        #start-btn {
            padding: 20px 40px; font-size: 1.5rem; background: var(--vane-red);
            border: none; color: white; border-radius: 50px; cursor: pointer;
            box-shadow: 0 0 20px var(--vane-red); font-family: 'Anton';
        }
    </style>
</head>
<body>

    <button id="start-btn" onclick="runPixarIntro()">HOLA VANE, TOCA AQUÍ 🎬</button>

    <div id="pixar-intro">
        <div id="pixar-cat">🐱</div>
        <span class="letter">V</span>
        <span class="letter">A</span>
        <span class="letter">N</span>
        <span class="letter">E</span>
    </div>

    <div class="bg-text-container" id="bg-texts"></div>

    <div id="main-content">
        <div class="vane-heavy">VANE</div>
        <div id="hug-scene" style="font-size: 120px; filter: drop-shadow(0 0 20px white);">🫂🐱</div>
        <div id="final-msg"></div>
    </div>

    <div id="shy-box-el" class="shy-box">
        <div class="emoji-shy">👉👈<br>🥹</div>
        <div style="font-size: 1.5rem;">¿Pero no estás enojada?</div>
    </div>

    <script>
        const words = ["LA MÁS TRABAJADORA", "REINA DEL GYM", "ARTISTA DEL TATUAJE", "DISCIPLINA PURA", "IMPARABLE", "CRACK"];
        const finalQuote = "TU DISCIPLINA MARCA EL CUERPO, TU ARTE MARCA LA PIEL. ¡ERES LEYENDA! 💪💉💅🔥";

        function runPixarIntro() {
            document.getElementById('start-btn').style.display = 'none';
            const cat = document.getElementById('pixar-cat');
            const letters = document.querySelectorAll('.letter');
            cat.style.display = 'block';

            let delay = 0;
            letters.forEach((l, i) => {
                setTimeout(() => {
                    // Animación del gato saltando sobre la letra
                    const rect = l.getBoundingClientRect();
                    cat.style.left = (rect.left - 10) + 'px';
                    cat.style.top = (rect.top - 80) + 'px';
                    
                    // La letra aparece cuando el gato cae
                    l.style.opacity = '1';
                    l.style.transform = 'translateY(0)';
                    l.style.transition = 'all 0.3s ease';
                }, delay);
                delay += 700;
            });

            setTimeout(startMainShow, delay + 1000);
        }

        function startMainShow() {
            document.getElementById('pixar-intro').style.display = 'none';
            document.getElementById('main-content').style.display = 'flex';
            document.getElementById('bg-texts').style.display = 'block';
            
            // Iniciar Fondo de textos
            initBackgroundTexts();
            
            // Iniciar Lluvia (Confeti, Pesas, Tatuajes, Uñas)
            setInterval(createChaosParticle, 100);

            // Mostrar Gatito Asomadizo
            setTimeout(() => {
                document.getElementById('shy-box-el').classList.add('peek');
            }, 2000);

            // Final: Frase Maestra
            setTimeout(() => {
                document.getElementById('shy-box-el').classList.remove('peek');
                typeFinalMsg();
            }, 7000);
        }

        function initBackgroundTexts() {
            const container = document.getElementById('bg-texts');
            words.forEach((w, i) => {
                const div = document.createElement('div');
                div.className = 'scrolling-text';
                div.innerHTML = w;
                div.style.top = (i * 15) + '%';
                div.style.animationDuration = (Math.random() * 10 + 10) + 's';
                container.appendChild(div);
            });
        }

        function createChaosParticle() {
            const p = document.createElement('div');
            p.className = 'particle';
            // MEZCLA: Confeti, Pesas, Tatuajes, Uñas, Brillos
            const types = ['🎊', '🏋️‍♀️', '💉', '💅', '🔥', '✨', '💖', '👟', '💀'];
            p.innerHTML = types[Math.floor(Math.random() * types.length)];
            p.style.left = Math.random() * 100 + 'vw';
            p.style.fontSize = (Math.random() * 30 + 20) + 'px';
            p.style.animationDuration = (Math.random() * 3 + 2) + 's';
            document.body.appendChild(p);
            setTimeout(() => p.remove(), 5000);
        }

        function typeFinalMsg() {
            const el = document.getElementById('final-msg');
            let i = 0;
            const timer = setInterval(() => {
                if (i < finalQuote.length) {
                    el.innerHTML += finalQuote.charAt(i);
                    i++;
                } else { clearInterval(timer); }
            }, 80);
        }
    </script>
</body>
</html>
