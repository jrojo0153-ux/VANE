<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Para Vane ❤️</title>
    <style>
        :root {
            --vane-color: linear-gradient(45deg, #ff0000, #ff69b4);
            --bg-dark: #000;
        }

        body, html {
            margin: 0; padding: 0; width: 100%; height: 100%;
            background-color: var(--bg-dark);
            color: white; font-family: 'Arial Rounded MT Bold', sans-serif;
            overflow: hidden; display: flex; flex-direction: column;
            justify-content: center; align-items: center; text-align: center;
        }

        /* Nombre VANE Neón */
        .vane-title {
            font-size: 4.5rem; font-weight: 900;
            background: var(--vane-color);
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
            text-transform: uppercase; letter-spacing: 10px;
            filter: drop-shadow(0 0 20px rgba(255, 0, 85, 0.8));
            animation: pulse 1.5s infinite ease-in-out;
            z-index: 20; margin-bottom: 50px;
        }

        @keyframes pulse { 0%, 100% { transform: scale(1); } 50% { transform: scale(1.1); } }

        /* Gatito Principal */
        .cat-main { font-size: 100px; z-index: 15; filter: drop-shadow(0 0 10px white); }
        .bounce { animation: bounce 0.6s infinite alternate; }
        @keyframes bounce { from { transform: translateY(0); } to { transform: translateY(-30px); } }

        /* Mensaje Central */
        #main-message {
            font-size: 2.2rem; min-height: 3rem; color: #fff;
            text-shadow: 0 0 15px #ff69b4; font-weight: bold; z-index: 20;
        }

        /* EL GATITO TÍMIDO (Se asoma desde abajo) */
        .shy-cat-box {
            position: absolute; bottom: -100px; /* Escondido */
            width: 100%; transition: bottom 2s cubic-bezier(0.175, 0.885, 0.32, 1.275);
            z-index: 30; display: none;
        }

        .shy-cat-box.peek { bottom: 10px; /* Sale un poquito */ }

        #shy-cat { font-size: 80px; cursor: pointer; }
        #question { font-size: 1.5rem; color: #ffdae0; text-shadow: 0 0 5px #ff0000; font-weight: bold; }

        /* Partículas */
        .particle { position: absolute; top: -50px; pointer-events: none; z-index: 5; animation: fall linear forwards; }
        @keyframes fall { to { transform: translateY(110vh) rotate(360deg); } }

        #hint { position: absolute; bottom: 30px; color: #666; }
    </style>
</head>
<body onclick="startStory()">

    <div class="vane-title">VANE</div>
    <div id="cat" class="cat-main">🐱</div>
    <div id="main-message"></div>

    <div id="shy-box" class="shy-cat-box">
        <div id="shy-cat">🥺👉👈</div>
        <div id="question">¿Pero no estás enojada?</div>
    </div>

    <p id="hint">Toca la pantalla, Vane...</p>

    <script>
        const txtExtraño = "TE EXTRAÑO...";
        const msgElement = document.getElementById('main-message');
        let active = false;

        function startStory() {
            if (active) return;
            active = true;
            document.getElementById('hint').style.display = 'none';
            document.getElementById('cat').classList.add('bounce');
            
            // Lluvia de rosas
            setInterval(createParticle, 150);

            // Escribir mensaje
            let i = 0;
            let timer = setInterval(() => {
                if (i < txtExtraño.length) {
                    msgElement.innerHTML += txtExtraño.charAt(i);
                    i++;
                } else {
                    clearInterval(timer);
                    triggerShyCat();
                }
            }, 150);
        }

        function triggerShyCat() {
            const box = document.getElementById('shy-box');
            box.style.display = 'block';
            
            // Efecto de asomarse poco a poco
            setTimeout(() => {
                box.classList.add('peek');
                document.getElementById('cat').innerHTML = '😻';
            }, 1000);

            // Hacer que se esconda y salga si ella no hace nada
            setInterval(() => {
                box.classList.toggle('peek');
            }, 4000);
        }

        function createParticle() {
            const p = document.createElement('div');
            p.classList.add('particle');
            const types = ['🌹', '🌸', '💖', '✨', '🎈'];
            p.innerHTML = types[Math.floor(Math.random() * types.length)];
            p.style.left = Math.random() * 100 + 'vw';
            p.style.fontSize = (Math.random() * 25 + 15) + 'px';
            p.style.animationDuration = (Math.random() * 3 + 2) + 's';
            p.style.opacity = Math.random();
            document.body.appendChild(p);
            setTimeout(() => p.remove(), 5000);
        }
    </script>
</body>
</html>
