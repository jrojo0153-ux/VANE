<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Vane: The Final Reveal 🎬</title>
    <link href="https://fonts.googleapis.com/css2?family=Anton&family=Special+Elite&display=swap" rel="stylesheet">
    <style>
        :root {
            --vane-red: #ff0000;
            --vane-pink: #ff69b4;
            --bg-dark: #000;
        }

        body, html {
            margin: 0; padding: 0; width: 100%; height: 100%;
            background-color: var(--bg-dark);
            color: white; font-family: 'Anton', sans-serif;
            overflow: hidden; display: flex; flex-direction: column;
            justify-content: center; align-items: center; text-align: center;
        }

        /* BOTONES CLICHÉ */
        .cliche-btn {
            padding: 15px 30px; font-size: 1.2rem; background: var(--vane-red);
            border: 2px solid white; color: white; border-radius: 50px;
            cursor: pointer; position: absolute; display: none; z-index: 1000;
            box-shadow: 0 0 20px var(--vane-red); transition: 0.2s;
        }

        /* INSTRUCCIONES INICIALES */
        #instructions { font-family: 'Special Elite', cursive; font-size: 1.8rem; color: var(--vane-pink); z-index: 400; }

        /* ESCENA PRINCIPAL */
        #camera-viewport { display: none; width: 100%; height: 100%; flex-direction: column; justify-content: center; align-items: center; }

        /* FRASES ESQUINAS (UNA POR UNA) */
        .dynamic-phrase {
            position: absolute; padding: 15px; font-size: 1.3rem;
            background: rgba(255,0,0,0.4); border-radius: 10px;
            opacity: 0; transition: 1s; z-index: 50;
        }

        /* REVELACIÓN FINAL DE EMOJIS */
        #emoji-reveal { font-size: 120px; display: none; flex-direction: column; align-items: center; z-index: 1001; }
        #emoji-subtext { font-size: 1.5rem; color: #ffd700; margin-top: 10px; }

        /* PARTÍCULAS */
        .particle { position: absolute; top: -50px; pointer-events: none; animation: fall linear forwards; }
        @keyframes fall { to { transform: translateY(110vh) rotate(720deg); } }
    </style>
</head>
<body>

    <div id="intro-buttons">
        <button class="cliche-btn" id="start-btn" style="display:block; position:relative;" onclick="nextStep(1)">HOLA VANE, DA CLICK AQUÍ 🎬</button>
        <button class="cliche-btn" id="btn-step-2" onclick="nextStep(2)">¡NO! MEJOR AQUÍ 👇</button>
        <button class="cliche-btn" id="btn-step-3" onclick="nextStep(3)">ESTE ES EL BUENO, AQUÍ 💎</button>
    </div>

    <div id="instructions"></div>

    <div id="camera-viewport">
        <div id="pixar-intro" style="font-size: 6rem; display: flex; gap: 15px;">
            <div id="pixar-cat" style="position:absolute; display:none;">🐱</div>
            <span class="letter" style="opacity:0;">V</span>
            <span class="letter" style="opacity:0;">A</span>
            <span class="letter" style="opacity:0;">N</span>
            <span class="letter" style="opacity:0;">E</span>
        </div>

        <div id="main-show" style="display:none; flex-direction: column; align-items: center;">
            <div style="font-size: 100px;">🫂🐱</div>
            <h1 style="font-size: 4rem; background: linear-gradient(to right, red, pink); -webkit-background-clip: text; -webkit-text-fill-color: transparent;">VANE</h1>
        </div>

        <div class="dynamic-phrase" style="top: 10%; right: 5%;" id="f1">ADMIRO TU DISCIPLINA 💪</div>
        <div class="dynamic-phrase" style="bottom: 15%; left: 5%;" id="f2">NADIE CHAMBEA COMO TÚ 🔥</div>
        <div class="dynamic-phrase" style="top: 30%; left: 10%;" id="f3">REINA DE LOS TATTOOS 💉</div>
        <div class="dynamic-phrase" style="bottom: 10%; right: 10%;" id="f4">UÑAS DE IMPACTO 💅✨</div>
    </div>

    <button class="cliche-btn" id="cliche-1" style="top:50%; left:50%; transform:translate(-50%, -50%);" onclick="clicheChase(2)">¿Quieres saber quién soy? (Cliché) AQUÍ</button>
    <button class="cliche-btn" id="cliche-2" style="top:20%; left:10%;" onclick="clicheChase(3)">¡NO! MEJOR AQUÍ</button>
    <button class="cliche-btn" id="cliche-3" style="top:70%; right:15%;" onclick="finalReveal()">¡AQUÍ POR FIN!</button>

    <div id="emoji-reveal">
        <div id="big-emoji"></div>
        <div id="emoji-subtext"></div>
    </div>

    <script>
        // Lógica de inicio (Botones teatro)
        function nextStep(s) {
            if(s==1) { document.getElementById('start-btn').style.display='none'; document.getElementById('btn-step-2').style.display='block'; }
            if(s==2) { document.getElementById('btn-step-2').style.display='none'; document.getElementById('btn-step-3').style.display='block'; }
            if(s==3) { document.getElementById('btn-step-3').style.display='none'; runInstructions(); }
        }

        function runInstructions() {
            const inst = ["¡SILENCIO EN LA SALA!", "APAGA LAS LUCES...", "QUE COMIENCE LA FUNCIÓN..."];
            const div = document.getElementById('instructions');
            let i = 0;
            const timer = setInterval(() => {
                if(i < inst.length) { div.innerHTML = inst[i]; i++; }
                else { clearInterval(timer); div.style.display='none'; startPixar(); }
            }, 1500);
        }

        function startPixar() {
            document.getElementById('camera-viewport').style.display='flex';
            const letters = document.querySelectorAll('.letter');
            const cat = document.getElementById('pixar-cat');
            cat.style.display='block';
            letters.forEach((l, i) => {
                setTimeout(() => {
                    const rect = l.getBoundingClientRect();
                    cat.style.left = (rect.left - 10) + 'px';
                    cat.style.top = (rect.top - 100) + 'px';
                    setTimeout(() => { l.style.opacity='1'; cat.style.top=(rect.top-50)+'px'; }, 300);
                }, i * 800);
            });
            setTimeout(mainShow, 4000);
        }

        function mainShow() {
            document.getElementById('pixar-intro').style.display='none';
            document.getElementById('main-show').style.display='flex';
            setInterval(createParticle, 100);

            // Frases una por una
            [1, 2, 3, 4].forEach(n => {
                setTimeout(() => {
                    const f = document.getElementById('f'+n);
                    f.style.opacity = '1';
                    setTimeout(() => f.style.opacity = '0', 2500);
                }, n * 3000);
            });

            // Al final de las frases, el botón cliché
            setTimeout(() => {
                document.getElementById('main-show').style.display='none';
                document.getElementById('cliche-1').style.display='block';
            }, 16000);
        }

        // Lógica de persecución final
        function clicheChase(step) {
            document.getElementById('cliche-'+(step-1)).style.display = 'none';
            document.getElementById('cliche-'+step).style.display = 'block';
        }

        function finalReveal() {
            document.getElementById('cliche-3').style.display = 'none';
            const reveal = document.getElementById('emoji-reveal');
            const bigE = document.getElementById('big-emoji');
            const sub = document.getElementById('emoji-subtext');
            reveal.style.display = 'flex';

            const sequence = [
                { e: '🙉', t: '' },
                { e: '🙈', t: '' },
                { e: '🐆', t: 'ESE NO...' },
                { e: '🐈', t: 'ESTE.' }
            ];

            let i = 0;
            const timer = setInterval(() => {
                if(i < sequence.length) {
                    bigE.innerHTML = sequence[i].e;
                    sub.innerHTML = sequence[i].t;
                    i++;
                } else { clearInterval(timer); }
            }, 1800);
        }

        function createParticle() {
            const p = document.createElement('div');
            p.className = 'particle';
            const items = ['🏋️‍♀️', '💉', '💅', '🔥', '✨', '💖', '🎊', '👟'];
            p.innerHTML = items[Math.floor(Math.random() * items.length)];
            p.style.left = Math.random() * 100 + 'vw';
            p.style.fontSize = (Math.random() * 25 + 15) + 'px';
            p.style.animationDuration = (Math.random() * 3 + 2) + 's';
            document.body.appendChild(p);
            setTimeout(() => p.remove(), 4000);
        }
    </script>
</body>
</html>
